const CURSOR_NAMES = { betsy: 'Betsy', abby: 'Abby & Libby', girls: '4 Girls', rick: 'Rick', david: 'David', mccain: 'Dave M.', shelby: 'Shelby', cheyenne: 'Cheyenne', derrick: 'Derrick', suspect: 'Suspect' };
const drawTimers = {};

function pointAlongLine(coords, t) {
  if (coords.length < 2) return coords[0];
  let total = 0;
  const segs = [];
  for (let i = 0; i < coords.length - 1; i++) {
    const dx = coords[i+1][0] - coords[i][0], dy = coords[i+1][1] - coords[i][1];
    const d = Math.sqrt(dx*dx + dy*dy);
    segs.push({ a: coords[i], b: coords[i+1], d });
    total += d;
  }
  let rem = Math.min(t, 1) * total;
  for (let i = 0; i < segs.length; i++) {
    const s = segs[i];
    if (rem <= s.d || i === segs.length - 1) {
      const f = s.d > 0 ? Math.min(1, rem / s.d) : 1;
      return [s.a[0] + f * (s.b[0] - s.a[0]), s.a[1] + f * (s.b[1] - s.a[1])];
    }
    rem -= s.d;
  }
  return coords[coords.length - 1];
}

function showCursor(wid, coords, t, label) {
  const src = map.getSource(`${wid}-cursor`);
  if (!src) return;
  src.setData({
    type: 'Feature',
    geometry: { type: 'Point', coordinates: pointAlongLine(coords, t) },
    properties: { label: label || '' }
  });
  if (!map.getLayer(`${wid}-cursor-dot`)) return;
  if (map.getPaintProperty(`${wid}-cursor-dot`, 'circle-opacity') === 0) {
    map.setPaintProperty(`${wid}-cursor-dot`, 'circle-opacity', 1);
    map.setPaintProperty(`${wid}-cursor-dot`, 'circle-stroke-opacity', 1);
    map.setPaintProperty(`${wid}-cursor-label`, 'text-opacity', 1);
  }
}

function hideCursor(wid) {
  if (!map.getLayer(`${wid}-cursor-dot`)) return;
  map.setPaintProperty(`${wid}-cursor-dot`, 'circle-opacity', 0);
  map.setPaintProperty(`${wid}-cursor-dot`, 'circle-stroke-opacity', 0);
  map.setPaintProperty(`${wid}-cursor-label`, 'text-opacity', 0);
}

function pathLength(coords) {
  let d = 0;
  for (let i = 0; i < coords.length - 1; i++) {
    const dx = coords[i+1][0] - coords[i][0], dy = coords[i+1][1] - coords[i][1];
    d += Math.sqrt(dx*dx + dy*dy);
  }
  return d;
}

function segDrawMs(coords) {
  // scale duration to physical length so cursor moves at a constant visual speed
  return Math.min(Math.max(pathLength(coords) / CURSOR_DEG_PER_MS, 1000), 5000);
}

function animateDraw(layerId, duration, coords, label) {
  if (drawTimers[layerId]) cancelAnimationFrame(drawTimers[layerId]);
  const wid = layerId.split('-seg-')[0];
  const start = Date.now();
  function frame() {
    const t = Math.min(1, (Date.now() - start) / duration);
    if (map.getLayer(layerId)) map.setPaintProperty(layerId, 'line-trim-offset', [t, 1]);
    showCursor(wid, coords, t, label);
    if (t < 1) drawTimers[layerId] = requestAnimationFrame(frame);
    else delete drawTimers[layerId];
  }
  drawTimers[layerId] = requestAnimationFrame(frame);
}

  slider.max   = total;
  slider.value = step;
  counter.textContent = step === 0 ? `— / ${total}` : `${step} / ${total}`;

  w.segments.forEach((seg, i) => {
    const id = `${activeWitness}-seg-${i}`;
    if (!map.getLayer(id)) return;
    if (i < step) {
      map.setPaintProperty(id, 'line-opacity', 0.9);
      if (i === step - 1) {
        map.setPaintProperty(id, 'line-trim-offset', [0, 1]);
        animateDraw(id, segDrawMs(seg.coords), seg.coords, `${CURSOR_NAMES[activeWitness] || activeWitness}\n${seg.time || ''}`);

      }
    } else {
      map.setPaintProperty(id, 'line-opacity', 0);
      map.setPaintProperty(id, 'line-trim-offset', [0, 1]);
    }
  });

  if (step === 0) hideCursor(activeWitness);

  pillRow.style.display = step === 0 ? 'none' : 'flex';
  if (step > 0) {
    const seg   = w.segments[step - 1];
    const color = seg.color;
    pillText.textContent = seg.label;
    pillTime.textContent = seg.time || '';
    pillTime.style.display = seg.time ? 'block' : 'none';
    const dot = pill.querySelector('.dot');
    dot.style.background  = color === '#ffffff' ? '#666' : color;
    dot.style.border      = color === '#ffffff' ? '1.5px solid #999' : 'none';
    pill.style.background = color === '#ffffff' ? 'rgba(255,255,255,0.15)' : color;
    pill.style.color      = (color === '#f5f000' || color === '#00e5ff' || color === '#ffffff') ? '#000' : '#000';
  }
}

function minToClockStr(min) {
  const h24 = Math.floor(min / 60);
  const m   = min % 60;
  const ampm = h24 >= 12 ? 'PM' : 'AM';
  const h12  = h24 % 12 || 12;
  return `${h12}:${String(m).padStart(2,'0')} ${ampm}`;
}

function renderAllStep(minutes) {
  allMinutes = Math.max(TIME_START, Math.min(TIME_END, minutes));

  const clockEl  = document.getElementById('clock-display');
  const pillRow  = document.getElementById('pill-row');
  const pill     = document.getElementById('event-pill');
  const pillTime = document.getElementById('pill-time');
  const slider   = document.getElementById('timeline-slider');
  const counter  = document.getElementById('step-counter');

  clockEl.textContent   = minToClockStr(Math.floor(allMinutes));
  clockEl.style.display = 'block';
  pill.style.display    = 'none';
  pillTime.style.display = 'none';
  pillRow.style.display  = 'flex';

  const span = TIME_END - TIME_START;
  slider.value = ((allMinutes - TIME_START) / span * 100).toFixed(2);
  counter.textContent = minToClockStr(Math.floor(allMinutes));

  Object.entries(SEG_TIMES).forEach(([wid, times]) => {
    let cursorCoords = null, cursorT = 0, cursorVisible = false;

    times.forEach((startMin, i) => {
      const id = `${wid}-seg-${i}`;
      if (!map.getLayer(id)) return;
      const endMin = Math.max(times[i + 1] || TIME_END, startMin + 1);
      if (allMinutes < startMin) {
        map.setPaintProperty(id, 'line-opacity', 0);
        map.setPaintProperty(id, 'line-trim-offset', [0, 1]);
      } else if (allMinutes >= endMin) {
        map.setPaintProperty(id, 'line-opacity', 0.9);
        map.setPaintProperty(id, 'line-trim-offset', [1, 1]);
        // cursor stays at endpoint of last completed segment
        cursorCoords = WITNESSES[wid].segments[i].coords;
        cursorT = 1;
        cursorVisible = true;
      } else {
        const progress = (allMinutes - startMin) / (endMin - startMin);
        map.setPaintProperty(id, 'line-opacity', 0.9);
        map.setPaintProperty(id, 'line-trim-offset', [progress, 1]);
        cursorCoords = WITNESSES[wid].segments[i].coords;
        cursorT = progress;
        cursorVisible = true;
      }
    });

    if (cursorVisible) showCursor(wid, cursorCoords, cursorT, CURSOR_NAMES[wid] || wid);
    else hideCursor(wid);
  });
}

function enterAllMode() {
  isAllMode = true;
  const slider = document.getElementById('timeline-slider');
  slider.min  = 0;
  slider.max  = 100;
  slider.step = 0.1;
  // hide per-witness layers except all
  Object.keys(WITNESSES).forEach(wid => {
    WITNESSES[wid].segments.forEach((_, i) => {
      const id = `${wid}-seg-${i}`;
      if (!map.getLayer(id)) return;
      map.setPaintProperty(id, 'line-opacity', 0);
      map.setPaintProperty(id, 'line-trim-offset', [0, 1]);
    });
  });
  renderAllStep(TIME_START);
}

function leaveAllMode() {
  isAllMode = false;
  const slider = document.getElementById('timeline-slider');
  slider.min  = 0;
  slider.step = 1;
  document.getElementById('clock-display').style.display = 'none';
  // hide all witness segments so switching to a single tab starts clean
  Object.keys(WITNESSES).forEach(wid => {
    WITNESSES[wid].segments.forEach((_, i) => {
      const id = `${wid}-seg-${i}`;
      if (!map.getLayer(id)) return;
      map.setPaintProperty(id, 'line-opacity', 0);
      map.setPaintProperty(id, 'line-trim-offset', [0, 1]);
    });
    WITNESSES[wid].step = 0;
    hideCursor(wid);
  });
}

document.querySelectorAll('.tab').forEach(btn => {
  btn.addEventListener('click', () => {
    stopPlay();
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    const witness = btn.dataset.witness;
    if (witness === 'all') {
      activeWitness = 'all';
      enterAllMode();
    } else {
      if (isAllMode) leaveAllMode();
      // hide cursors for all other witnesses
      Object.keys(WITNESSES).forEach(w => { if (w !== witness) hideCursor(w); });
      activeWitness = witness;
      renderStep(WITNESSES[activeWitness].step);
    }
  });
});

document.getElementById('timeline-slider').addEventListener('input', e => {
  stopPlay();
  if (isAllMode) {
    const pct = parseFloat(e.target.value);
    renderAllStep(TIME_START + (pct / 100) * (TIME_END - TIME_START));
  } else {
    renderStep(parseInt(e.target.value));
  }
});

document.getElementById('play-btn').addEventListener('click', () => {
  if (isPlaying) { stopPlay(); return; }

  if (isAllMode) {
    if (allMinutes >= TIME_END) renderAllStep(TIME_START);
    isPlaying    = true;
    playStartMs  = Date.now();
    playStartMin = allMinutes;
    document.getElementById('play-btn').innerHTML = '&#9646;&#9646;';
    function tickAll() {
      if (!isPlaying) return;
      const elapsed = (Date.now() - playStartMs) / 1000; // seconds elapsed
      const simMin  = playStartMin + elapsed / SEC_PER_MIN;
      if (simMin >= TIME_END) {
        renderAllStep(TIME_END);
        stopPlay();
        return;
      }
      renderAllStep(simMin);
      playTimer = requestAnimationFrame(tickAll);
    }
    playTimer = requestAnimationFrame(tickAll);
  } else {
    const w = WITNESSES[activeWitness];
    if (w.step >= w.segments.length) renderStep(0);
    isPlaying = true;
    document.getElementById('play-btn').innerHTML = '&#9646;&#9646;';
    function tickStep() {
      const ww = WITNESSES[activeWitness];
      if (ww.step >= ww.segments.length) { stopPlay(); return; }
      const nextStep = ww.step + 1;
      const nextSeg = ww.segments[nextStep - 1];
      renderStep(nextStep);
      playTimer = setTimeout(tickStep, segDrawMs(nextSeg.coords) + 400);
    }
    tickStep();
  }
});

function stopPlay() {
  isPlaying = false;
  if (isAllMode) {
    cancelAnimationFrame(playTimer);
  } else {
    clearTimeout(playTimer);
  }
  playTimer = null;
  document.getElementById('play-btn').innerHTML = '&#9654;';
}
</script>
</body>
